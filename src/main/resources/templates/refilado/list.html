<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Módulo Refilado</title>
    <style>
        .verde {
            background-color: #c8e6c9;
            font-weight: bold;
        }

        .amarillo {
            background-color: #fff9c4;
            font-weight: bold;
        }

        .rojo {
            background-color: #ffcdd2;
            font-weight: bold;
        }

        .tabla-estilo {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .tabla-estilo th {
            background-color: #dbe5f1;
            padding: 8px;
            border: 1px solid #666;
            text-align: center;
        }

        .tabla-estilo td {
            padding: 8px;
            border: 1px solid #666;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Módulo de Refilado</h1>

    <p>
        <a th:href="@{/refilado/nueva}" style="
            display:inline-block;
            background-color:#06286b;
            color:white;
            text-decoration:none;
            padding:15px 25px;
            font-weight:bold;
            font-size:20px;
            border:2px solid #1d3c78;
            box-shadow:2px 2px 6px rgba(0,0,0,0.4);">
            CAPTURAR NUEVA ORDEN
        </a>
    </p>

    <div style="overflow-x:auto;">
        <table class="tabla-estilo">
            <thead>
                <tr>
                    <th>OT</th>
                    <th>Tipo base</th>
                    <th>Kg base corte</th>
                    <th>Cantidad requerida</th>
                    <th>Kg refilado</th>
                    <th>Kg desperdicio</th>
                    <th>Desp_edit</th>
                    <th>Kg refil</th>
                    <th>Diferencia</th>
                    <th>% entrega</th>
                    <th>Retorno</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="r : ${refilados}">
                    <td th:text="${r.orden.ot}"></td>
                    <td th:text="${r.tipoBase}"></td>
                    <td th:text="${r.kgBaseCorte != null ? T(java.lang.String).format(T(java.util.Locale).US, '%.2f', r.kgBaseCorte) : 'Sin dato'}"></td>
                    <td th:text="${r.cantidadRequeridaot != null ? T(java.lang.String).format(T(java.util.Locale).US, '%.2f', r.cantidadRequeridaot) : 'Sin dato'}"></td>
                    <td th:text="${r.kgRefilado}"></td>
                    <td th:text="${r.kgDesperdicio}"></td>
                    <td th:text="${r.kgDesperdicioEdit != null ? T(java.lang.String).format(T(java.util.Locale).US, '%.2f', r.kgDesperdicioEdit) : '0.00'}"></td>
                    <td th:text="${r.kgRefil}"></td>
                    <td th:text="${r.difBaseVsRefiladoTotal != null ? T(java.lang.String).format(T(java.util.Locale).US, '%.2f', r.difBaseVsRefiladoTotal) : 'Sin dato'}"
                        th:class="${r.difBaseVsRefiladoTotal == null ? '' :
                                   (r.difBaseVsRefiladoTotal >= -10 and r.difBaseVsRefiladoTotal <= 10 ? 'verde' :
                                   ((r.difBaseVsRefiladoTotal >= -30 and r.difBaseVsRefiladoTotal < -10) or (r.difBaseVsRefiladoTotal > 10 and r.difBaseVsRefiladoTotal <= 30) ? 'amarillo' : 'rojo'))}">
                    </td>
                    <td th:text="${r.porcentajeEntrega != null ? T(java.lang.String).format(T(java.util.Locale).US, '%.2f', r.porcentajeEntrega) + '%' : 'Sin dato'}"
                        th:class="${r.porcentajeEntrega == null ? '' :
                                   (r.porcentajeEntrega >= 100 ? 'verde' :
                                   (r.porcentajeEntrega >= 95 and r.porcentajeEntrega < 100 ? 'amarillo' : 'rojo'))}">
                    </td>
                    <td th:text="${r.retorno != null ? T(java.lang.String).format(T(java.util.Locale).US, '%.2f', r.retorno) : 'Sin dato'}"></td>
                    <td th:text="${r.estadoProceso != null ? r.estadoProceso : 'Sin dato'}"
                        th:class="${r.estadoProceso == null ? '' :
                                   (r.estadoProceso == 'Secuencia ref completada' ? 'verde' : 'rojo')}">
                    </td>
                    <td>
                        <a th:href="@{/refilado/editar/{id}(id=${r.id})}" style="
                            display:inline-block;
                            background-color:#fbc02d;
                            color:black;
                            text-decoration:none;
                            padding:6px 12px;
                            font-weight:bold;
                            border:1px solid #b28704;
                            border-radius:6px;
                            margin-right:6px;">
                            Editar
                        </a>

                        <form th:action="@{/refilado/eliminar/{id}(id=${r.id})}" method="post" style="display:inline;">
                            <button type="submit" onclick="return confirm('¿Deseas eliminar esta captura de refilado?');"
                                    style="
                                    background-color:#d32f2f;
                                    color:white;
                                    padding:6px 12px;
                                    font-weight:bold;
                                    border:1px solid #8b1e1e;
                                    border-radius:6px;
                                    cursor:pointer;">
                                Eliminar
                            </button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(refilados)}">
                    <td colspan="13">No hay capturas de refilado registradas.</td>
                </tr>
            </tbody>
        </table>
    </div>

    <p>
        <a th:href="@{/}" style="
            display:inline-block;
            background-color:#0b2a78;
            color:white;
            text-decoration:none;
            padding:12px 22px;
            font-weight:bold;
            border:2px solid #001a57;
            border-radius:8px;
            box-shadow:0 4px 0 #001a57, 0 6px 10px rgba(0,0,0,0.25);
            transition:0.2s;">
            VOLVER AL INICIO
        </a>
    </p>
</body>
</html>
