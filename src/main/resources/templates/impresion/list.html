<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Módulo Impresión</title>
    
    <style>
        .verde {
            background-color: #c8e6c9;
            font-weight: bold;
        }

        .amarillo {
            background-color: #fff9c4;
            font-weight: bold;
        }

        .rojo {
            background-color: #ffcdd2;
            font-weight: bold;
        }

        /* 🔥 NUEVO: estilo tabla */
        .tabla-estilo {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .tabla-estilo th {
            background-color: #dbe5f1;
            padding: 8px;
            border: 1px solid #666;
            text-align: center;
        }

        .tabla-estilo td {
            padding: 8px;
            border: 1px solid #666;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Módulo de Impresión</h1>

    <p>
        <a th:href="@{/impresion/nueva}" style="
            display:inline-block;
            background-color:#06286b;
            color:white;
            text-decoration:none;
            padding:15px 25px;
            font-weight:bold;
            font-size:20px;
            border:2px solid #1d3c78;
            box-shadow:2px 2px 6px rgba(0,0,0,0.4);">
            CAPTURAR NUEVA ORDEN
        </a>
    </p>

    
    <div style="overflow-x:auto;">
        <table class="tabla-estilo">
            <thead>
                <tr>
                    <th>OT</th>
                    <th>Código</th>
                    <th>Producto</th>
                    <th>Kg Req/Surt</th>
                    <th>Kg surtido</th>
                    <th>Ancho material</th>
                    <th>Kg impreso</th>
                    <th>Kg desperdicio</th>
                    <th>Desp_edit</th>
                    <th>Metros</th>
                    <th>M²</th>
                    <th>Kg tinta</th>
                    <th>Dif surt vs impreso</th>
                    <th>Retorno real</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="i : ${impresiones}">
                    <td th:text="${i.orden.ot}"></td>
                    <td th:text="${i.orden.codigo}"></td>
                    <td th:text="${i.orden.producto}"></td>
                    <td th:text="${i.kgReqSurt}"></td>
                    <td th:text="${i.kgSurtido}"></td>
                    <td th:text="${i.anchoMaterial}"></td>
                    <td th:text="${i.kgImpreso}"></td>
                    <td th:text="${i.kgDesperdicio}"></td>

                    <!-- 🔥 CORREGIDO -->
                    <td th:text="${i.kgDesperdicioEdit != null ? 
                        T(java.lang.String).format(T(java.util.Locale).US, '%.2f', i.kgDesperdicioEdit) : '0.00'}">
                    </td>

                    <td th:text="${i.metros}"></td>

                    <td th:text="${i.metrosCuadrados != null ? 
                        T(java.lang.String).format(T(java.util.Locale).US, '%.2f', i.metrosCuadrados) : 'Sin dato'}">
                    </td>

                    <td th:text="${i.kgTinta != null ? 
                        T(java.lang.String).format(T(java.util.Locale).US, '%.2f', i.kgTinta) : 'Sin dato'}">
                    </td>

                    <td th:text="${i.difSurtVsImpreso != null ? 
                        T(java.lang.String).format(T(java.util.Locale).US, '%.2f', i.difSurtVsImpreso) : 'Sin dato'}"
                        th:class="${i.difSurtVsImpreso == null ? '' :
                                   (i.difSurtVsImpreso >= -10 and i.difSurtVsImpreso <= 10 ? 'verde' :
                                   ((i.difSurtVsImpreso >= -30 and i.difSurtVsImpreso < -10) or 
                                    (i.difSurtVsImpreso > 10 and i.difSurtVsImpreso <= 30) ? 'amarillo' : 'rojo'))}">
                    </td>

                    <td th:text="${i.retornoReal != null ? 
                        T(java.lang.String).format(T(java.util.Locale).US, '%.2f', i.retornoReal) : 'Sin dato'}">
                    </td>

                    <!-- 🔥 CORREGIDO ESTADO -->
                    <td th:text="${i.estadoProceso != null ? i.estadoProceso : 'Sin dato'}"
                        th:class="${i.estadoProceso == null ? '' :
                                   (i.estadoProceso == 'Secuencia imp completada' ? 'verde' : 'rojo')}">
                    </td>

                    <td>
                        <a th:href="@{/impresion/editar/{id}(id=${i.id})}" style="
                            display:inline-block;
                            background-color:#fbc02d;
                            color:black;
                            text-decoration:none;
                            padding:6px 12px;
                            font-weight:bold;
                            border:1px solid #b28704;
                            border-radius:6px;
                            margin-right:6px;">
                            Editar
                        </a>

                        <form th:action="@{/impresion/eliminar/{id}(id=${i.id})}" method="post" style="display:inline;">
                            <button type="submit" onclick="return confirm('¿Deseas eliminar esta captura de impresión?');"
                                    style="
                                    background-color:#d32f2f;
                                    color:white;
                                    padding:6px 12px;
                                    font-weight:bold;
                                    border:1px solid #8b1e1e;
                                    border-radius:6px;
                                    cursor:pointer;">
                                Eliminar
                            </button>
                        </form>
                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(impresiones)}">
                    <td colspan="16">No hay capturas de impresión registradas.</td>
                </tr>
            </tbody>
        </table>
    </div>

    <p>
        <a th:href="@{/}" style="
            display:inline-block;
            background-color:#0b2a78;
            color:white;
            text-decoration:none;
            padding:12px 22px;
            font-weight:bold;
            border:2px solid #001a57;
            border-radius:8px;
            box-shadow:0 4px 0 #001a57, 0 6px 10px rgba(0,0,0,0.25);
            transition:0.2s;">
            VOLVER AL INICIO
        </a>
    </p>
</body>
</html>
